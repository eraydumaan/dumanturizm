<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf7ef"/>
      <stop offset="100%" style="stop-color:#f5efe6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c3753b"/>
      <stop offset="100%" style="stop-color:#9a4d2a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#c3753b" opacity="0.1"/>
  <circle cx="100" cy="530" r="150" fill="#c3753b" opacity="0.08"/>
  
  <!-- Logo Box -->
  <rect x="80" y="215" width="120" height="120" rx="28" fill="url(#accentGrad)"/>
  <text x="140" y="295" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#fff" text-anchor="middle">DT</text>
  
  <!-- Text -->
  <text x="230" y="265" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#1e1a16">Duman Turizm</text>
  <text x="230" y="320" font-family="Arial, sans-serif" font-size="28" fill="#6b6258">İstanbul Servis Taşımacılığı</text>
  
  <!-- Stats -->
  <g transform="translate(80, 400)">
    <rect width="300" height="100" rx="16" fill="#fff" opacity="0.8"/>
    <text x="30" y="45" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#c3753b">+35</text>
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="16" fill="#6b6258">Yıllık Tecrübe</text>
    
    <text x="150" y="45" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#c3753b">80+</text>
    <text x="150" y="75" font-family="Arial, sans-serif" font-size="16" fill="#6b6258">Güzergah</text>
  </g>
  
  <!-- Tagline -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="24" fill="#1e1a16">Güvenli, düzenli ve zamanında servis taşımacılığı.</text>
  
  <!-- URL -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="18" fill="#6b6258" text-anchor="end">dumanturizm.vercel.app</text>
</svg>
